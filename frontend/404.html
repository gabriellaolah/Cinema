<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - The Twilight Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: "Courier New", Courier, monospace;
            text-align: center;
            padding: 50px;
        }

        .glitch-text {
            font-size: 2rem;
            text-transform: uppercase;
            animation: glitch 1s infinite alternate;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px 0px #ff00ff, -2px -2px 0px #00ffff; }
            50% { text-shadow: -2px -2px 0px #ff00ff, 2px 2px 0px #00ffff; }
            100% { text-shadow: 4px 4px 0px #ff00ff, -4px -4px 0px #00ffff; }
        }

        .vhs-static {
            background: url('./pictures/static-noise.png') repeat;
            opacity: 0.3;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .back-home {
            margin-top: 20px;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background-color 0.3s ease-in-out;
        }

        .back-home:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>

    <div class="vhs-static"></div>

    <h1 class="glitch-text">Looks like you've entered... <br> The Twilight Zone </h1>
    
    <p>We searched every VHS tape in the archive, but this page doesn't exist.</p>
    <p>Either you're lost in a parallel universe, or you typed the wrong URL.</p>

    <a href="index.html" class="back-home">Return to Reality</a>

</body>
</html>
